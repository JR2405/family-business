<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Máquina — Mi Negocio</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">
  <div class="page-header">
    <h1>Máquina</h1>
    <button class="btn btn-primary" style="width:auto;padding:10px 16px" onclick="openModal('addModal')">+ Registrar</button>
  </div>

  <div id="totalCard" class="stat-card" style="margin-bottom:16px">
    <span class="label">Total acumulado</span>
    <span class="value" id="totalVal">$0.00</span>
  </div>

  <div id="list" class="item-list">
    <div class="empty">Cargando...</div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Nuevo Ingreso</h2>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" id="add_fecha">
    </div>
    <div class="form-group">
      <label>Monto ($)</label>
      <input type="number" id="add_monto" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
    </div>
    <div class="form-group">
      <label>Nota (opcional)</label>
      <input type="text" id="add_nota" placeholder="Descripción...">
    </div>
    <button class="btn btn-primary" onclick="saveNew()">Guardar</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Editar Ingreso</h2>
      <button class="modal-close" onclick="closeModal('editModal')">×</button>
    </div>
    <input type="hidden" id="edit_id">
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" id="edit_fecha">
    </div>
    <div class="form-group">
      <label>Monto ($)</label>
      <input type="number" id="edit_monto" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
    </div>
    <div class="form-group">
      <label>Nota</label>
      <input type="text" id="edit_nota" placeholder="Descripción...">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveEdit()">Guardar</button>
      <button class="btn btn-danger" onclick="deleteEntry()">Eliminar</button>
    </div>
  </div>
</div>

<nav class="nav">
  <a href="/dashboard">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Inicio
  </a>
  <a href="/loteria">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
    Lotería
  </a>
  <a href="/maquina" class="active">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    Máquina
  </a>
  <a href="/clientes">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>
    Clientes
  </a>
  <a href="/caja">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
    Caja
  </a>
</nav>

<script src="/js/app.js"></script>
<script>
  checkAuth();
  document.getElementById('add_fecha').value = today();

  async function loadList() {
    const data = await api('GET', '/api/maquina');
    const list = document.getElementById('list');
    if (!data || !data.length) {
      list.innerHTML = '<div class="empty">Sin registros aún.</div>';
      document.getElementById('totalVal').textContent = '$0.00';
      return;
    }
    const total = data.reduce((s, r) => s + r.monto, 0);
    document.getElementById('totalVal').textContent = fmt(total);
    list.innerHTML = data.map(r => `
      <div class="item" onclick="openEdit(${JSON.stringify(r).replace(/"/g,'&quot;')})">
        <div class="item-info">
          <div class="item-title">${r.fecha}</div>
          ${r.nota ? `<div class="item-sub">${r.nota}</div>` : ''}
        </div>
        <div class="item-value">${fmt(r.monto)}</div>
      </div>
    `).join('');
  }

  async function saveNew() {
    const fecha = document.getElementById('add_fecha').value;
    const monto = document.getElementById('add_monto').value;
    const nota = document.getElementById('add_nota').value;
    if (!fecha || !monto) return showToast('Completa fecha y monto', 'error');
    await api('POST', '/api/maquina', { fecha, monto, nota });
    closeModal('addModal');
    document.getElementById('add_monto').value = '';
    document.getElementById('add_nota').value = '';
    showToast('Ingreso guardado');
    loadList();
  }

  function openEdit(r) {
    document.getElementById('edit_id').value = r.id;
    document.getElementById('edit_fecha').value = r.fecha;
    document.getElementById('edit_monto').value = r.monto;
    document.getElementById('edit_nota').value = r.nota || '';
    openModal('editModal');
  }

  async function saveEdit() {
    const id = document.getElementById('edit_id').value;
    const fecha = document.getElementById('edit_fecha').value;
    const monto = document.getElementById('edit_monto').value;
    const nota = document.getElementById('edit_nota').value;
    await api('PUT', '/api/maquina/' + id, { fecha, monto, nota });
    closeModal('editModal');
    showToast('Actualizado');
    loadList();
  }

  async function deleteEntry() {
    if (!confirm('¿Eliminar este registro?')) return;
    const id = document.getElementById('edit_id').value;
    await api('DELETE', '/api/maquina/' + id);
    closeModal('editModal');
    showToast('Eliminado');
    loadList();
  }

  loadList();
</script>
</body>
</html>
