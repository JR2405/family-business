<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Acceso — Mi Negocio</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-page { padding-top: env(safe-area-inset-top); }
    .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-left: 4px; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-logo">
    <h1>MI NEGOCIO<span class="dot"></span></h1>
    <p>Sistema de gestión familiar</p>
  </div>
  <div class="login-box">
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="usuario" placeholder="Tu usuario" autocomplete="username" autocapitalize="none">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="loginBtn">
      Entrar
    </button>
  </div>
</div>

<script src="/js/login.js"></script>
</body>
</html>
